name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # or master, I'll use main based on modern defaults

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6' # Matching user's local version
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Setup SQLite Web
        run: dart run sqflite_common_ffi_web:setup

      - name: Build Web
        run: flutter build web --release --base-href "/blinkitclone/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
